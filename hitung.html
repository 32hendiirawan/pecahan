<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petualangan Pecahan</title>
    <link rel="stylesheet" href="asset/style.css"> 
</head>
<body>
    <h2>OPERASI HITUNG PECAHAN</h2>    
    <div class="game-board">
        <table>
            <tr>
                <td rowspan="3">
                    <input type="text" id="a" placeholder="a" class="bil-bulat" inputmode="none" readonly>
                </td>
                <td>
                    <input type="text" id="b" placeholder="b" class="pembilang" inputmode="none" readonly>
                </td>
                <td rowspan="3">
                    <select id="op" onchange="hideNumpad()">
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="x">×</option>
                        <option value=":">÷</option>
                    </select>
                </td>
                <td rowspan="3">
                    <input type="text" id="d" placeholder="d" class="bil-bulat" inputmode="none" readonly>
                </td>
                <td>
                    <input type="text" id="e" placeholder="e" class="pembilang" inputmode="none" readonly>
                </td>
                <td rowspan="3">
                    <span class="equal-sign">=</span>
                </td>
                
                <td rowspan="3">
                    <div id="ha" class="result-display bil-bulat">...</div>
                </td>
                <td>
                    <div id="hb" class="result-display pembilang">...</div>
                </td>
            </tr>
            <tr style="height: 5px;">
                <td style="min-width:24px"><hr></td>
                <td style="min-width:24px"><hr></td>
                <td style="min-width:24px"><hr></td>
            </tr>
            <tr>
                <td>
                    <input type="text" id="c" placeholder="c" class="penyebut" inputmode="none" readonly>
                </td>
                <td>
                    <input type="text" id="f" placeholder="f" class="penyebut" inputmode="none" readonly>
                </td>
                <td>
                    <div id="hc" class="result-display penyebut">...</div>
                </td>
            </tr>
        </table>
    </div>

    <div class="button-group">
        <button class="btn-action btn-hitung" onclick="calculate()">Hitung</button>
        <button class="btn-action btn-reset" onclick="reset()">Bersihkan</button>
        <button class="btn-action btn-home" onclick="location.href='index.html'">Home</button>
    </div>

    <div class="result-box" id="result-box">
        <div class="result-title">Penyelesaian:</div>
        <div id="result"></div>
    </div>

    <div class="custom-numpad" id="numpad">
        <button class="numpad-btn btn-1" onclick="pressNum('1')">1</button>
        <button class="numpad-btn btn-2" onclick="pressNum('2')">2</button>
        <button class="numpad-btn btn-3" onclick="pressNum('3')">3</button>
        
        <button class="numpad-btn btn-4" onclick="pressNum('4')">4</button>
        <button class="numpad-btn btn-5" onclick="pressNum('5')">5</button>
        <button class="numpad-btn btn-6" onclick="pressNum('6')">6</button>
        
        <button class="numpad-btn btn-7" onclick="pressNum('7')">7</button>
        <button class="numpad-btn btn-8" onclick="pressNum('8')">8</button>
        <button class="numpad-btn btn-9" onclick="pressNum('9')">9</button>

        <button class="numpad-btn btn-del" onclick="pressDel()">⌫</button>
        <button class="numpad-btn btn-0" onclick="pressNum('0')">0</button>
        <button class="numpad-btn btn-done" onclick="hideNumpad()">🔻</button>
    </div>
    <script src="asset/script.js"></script>
</body>
</html>
